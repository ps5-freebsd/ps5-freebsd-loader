name: Build and Release

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build PS5 FreeBSD loader
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build with PS5 payload SDK
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            -e PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk \
            ps5freebsd/ps5-payload-sdk:clang18 \
            sh -lc 'make clean all'

      - name: Upload loader artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps5-freebsd-loader
          path: bin/ps5-freebsd-loader.elf
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/ps5-freebsd-loader.elf
